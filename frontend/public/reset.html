<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Bitcoin Mining App</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #000000 0%, #1a1a1a 100%);
            color: white;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .container {
            background: #2a2a2a;
            border-radius: 15px;
            padding: 40px;
            max-width: 400px;
            width: 90%;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .title {
            color: #FFD700;
            font-size: 28px;
            font-weight: bold;
            margin: 10px 0;
        }
        
        .subtitle {
            color: #AAA;
            font-size: 16px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .input {
            width: 100%;
            padding: 15px;
            background: #333;
            border: 1px solid #555;
            border-radius: 8px;
            color: white;
            font-size: 16px;
            box-sizing: border-box;
        }
        
        .input:focus {
            outline: none;
            border-color: #FFD700;
        }
        
        .button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #FFD700 0%, #FFC000 100%);
            color: #000;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }
        
        .button:hover {
            background: linear-gradient(135deg, #FFC000 0%, #FFB000 100%);
        }
        
        .button:disabled {
            background: #666;
            cursor: not-allowed;
        }
        
        .message {
            padding: 15px;
            border-radius: 8px;
            margin: 20px 0;
            text-align: center;
        }
        
        .success {
            background: #1B5E20;
            color: #4CAF50;
        }
        
        .error {
            background: #B71C1C;
            color: #F44336;
        }
        
        .back-link {
            text-align: center;
            margin-top: 20px;
        }
        
        .back-link a {
            color: #FFD700;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div style="font-size: 48px;">🔑</div>
            <div class="title">Reset Password</div>
            <div class="subtitle">Enter your new password below</div>
        </div>
        
        <form id="resetForm">
            <div class="form-group">
                <input type="password" id="newPassword" class="input" placeholder="New Password" required>
            </div>
            
            <div class="form-group">
                <input type="password" id="confirmPassword" class="input" placeholder="Confirm New Password" required>
            </div>
            
            <button type="submit" id="resetButton" class="button">Reset Password</button>
        </form>
        
        <div id="message" class="message" style="display: none;"></div>
        
        <div class="back-link">
            <a href="/">← Back to Login</a>
        </div>
        
        <div style="text-align: center; margin-top: 20px; font-size: 12px; color: #4CAF50;">
            🔒 Your password will be encrypted and stored securely
        </div>
    </div>

    <script>
        // Get token from URL
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');
        
        if (!token) {
            showMessage('Invalid reset token. Please request a new password reset.', 'error');
        }
        
        document.getElementById('resetForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const resetButton = document.getElementById('resetButton');
            
            // Validation
            if (!newPassword.trim()) {
                showMessage('Please enter a new password', 'error');
                return;
            }
            
            if (newPassword.length < 6) {
                showMessage('Password must be at least 6 characters long', 'error');
                return;
            }
            
            if (newPassword !== confirmPassword) {
                showMessage('Passwords do not match', 'error');
                return;
            }
            
            // Disable button and show loading
            resetButton.disabled = true;
            resetButton.textContent = 'Processing...';
            showMessage('Processing your request...', 'info');
            
            try {
                const response = await fetch('https://admin-balance-mgmt-1.preview.emergentagent.com/api/auth/reset-password', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        token: token,
                        new_password: newPassword
                    })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    showMessage('✅ Password reset successful! You can now log in with your new password.', 'success');
                    setTimeout(() => {
                        window.location.href = '/';
                    }, 2000);
                } else {
                    showMessage('❌ ' + (data.detail || 'Failed to reset password'), 'error');
                }
            } catch (error) {
                showMessage('❌ Network error: ' + error.message, 'error');
            } finally {
                resetButton.disabled = false;
                resetButton.textContent = 'Reset Password';
            }
        });
        
        function showMessage(text, type) {
            const messageDiv = document.getElementById('message');
            messageDiv.textContent = text;
            messageDiv.className = 'message ' + type;
            messageDiv.style.display = 'block';
        }
    </script>
</body>
</html>
